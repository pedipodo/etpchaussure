name: Stocker les réponses

on:
  repository_dispatch:
    types: [new_response]

jobs:
  store_response:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout le dépôt
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Mettre à jour responses.csv
        run: python store_response.py

      - name: Commit et push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add responses.csv
          git commit -m "Nouvelle réponse ajoutée : ${{ github.event.client_payload.id }}"
          git push
